
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taita Taveta County - Project Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet for Mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        :root {
            --tt-green: #00843D;
            --tt-yellow: #FFCD00;
            --tt-orange: #F37021;
            --tt-navy: #003399;
            --tt-black: #1A1A1A;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: var(--tt-black);
        }
        .tt-green { color: var(--tt-green); }
        .tt-bg-green { background-color: var(--tt-green); }
        .tt-yellow { color: var(--tt-yellow); }
        .tt-bg-yellow { background-color: var(--tt-yellow); }
        .tt-orange { color: var(--tt-orange); }
        .tt-bg-orange { background-color: var(--tt-orange); }
        .tt-navy { color: var(--tt-navy); }
        .tt-bg-navy { background-color: var(--tt-navy); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--tt-green);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* Map specific styles */
        .project-map-container {
            height: 600px;
            width: 100%;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
    </style>
<script type="importmap">
{

  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
